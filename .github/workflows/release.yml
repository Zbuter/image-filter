name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            ort_url: 'https://github.com/microsoft/onnxruntime/releases/download/v1.21.0/onnxruntime-osx-arm64-1.21.0.tgz'
            ort_ext: 'tgz'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            ort_url: 'https://github.com/microsoft/onnxruntime/releases/download/v1.21.0/onnxruntime-osx-x64-1.21.0.tgz'
            ort_ext: 'tgz'
          - platform: 'windows-latest'
            target: ''
            ort_url: 'https://github.com/microsoft/onnxruntime/releases/download/v1.21.0/onnxruntime-win-x64-1.21.0.zip'
            ort_ext: 'zip'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          brew install libpng

      - name: Download ONNX Runtime (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          mkdir -p ort-lib
          curl -L "${{ matrix.ort_url }}" -o ort.tgz
          tar xzf ort.tgz -C ort-lib --strip-components=1
          echo "ORT_LIB_LOCATION=$PWD/ort-lib/lib" >> $GITHUB_ENV

      - name: Download ONNX Runtime (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ort-lib
          Invoke-WebRequest -Uri "${{ matrix.ort_url }}" -OutFile ort.zip
          Expand-Archive -Path ort.zip -DestinationPath ort-lib -Force
          $libDir = (Get-ChildItem ort-lib -Directory | Select-Object -First 1).FullName + '\lib'
          echo "ORT_LIB_LOCATION=$libDir" >> $env:GITHUB_ENV

      - name: Install frontend dependencies
        run: npm install

      - name: Extract changelog for version
        id: changelog
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          CHANGELOG=$(awk "/^## \[$VERSION\]/{flag=1;next}/^## \[/{flag=0}flag" CHANGELOG.md)
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="See assets to download this version."
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          ORT_LIB_LOCATION: ${{ env.ORT_LIB_LOCATION }}
        with:
          tagName: v__VERSION__
          releaseName: "Image Filter v__VERSION__"
          releaseBody: ${{ steps.changelog.outputs.changelog }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.target != '' && format('--target {0}', matrix.target) || '' }}