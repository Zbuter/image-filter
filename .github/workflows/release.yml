name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          brew install libpng

      - name: Install frontend dependencies
        run: npm install

      - name: Extract changelog for version
        id: changelog
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          CHANGELOG=$(awk "/^## \[${VERSION}\]/{flag=1;next}/^## \[/{flag=0}flag" CHANGELOG.md)
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="See assets to download this version."
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.5.21
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "Image Filter v__VERSION__"
          releaseBody: ${{ steps.changelog.outputs.changelog }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      - name: Upload updater artifacts to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_REPO: ${{ github.repository }}
        shell: bash
        run: node scripts/upload-updater-artifacts.js

  merge-updater-json:
    needs: publish-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get tag name
        id: get_tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Wait for release and collect assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.get_tag.outputs.tag }}"
          REPO="${{ github.repository }}"
          for i in $(seq 1 30); do
            if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
              echo "Release available!"
              break
            fi
            sleep 10
          done
          mkdir -p assets
          gh release download "$TAG" --repo "$REPO" --dir assets --clobber || true
          ls -la assets/

      - name: Build latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_VERSION: ${{ steps.get_tag.outputs.tag }}
          BUILD_ASSETS_DIR: assets
        run: |
          TAG="${{ steps.get_tag.outputs.tag }}"
          REPO="${{ github.repository }}"
          export BUILD_VERSION="${TAG#v}"
          export BUILD_BASE_URL="https://github.com/$REPO/releases/download/$TAG"
          RELEASE_INFO=$(gh api repos/$REPO/releases/tags/$TAG)
          export BUILD_PUB_DATE=$(echo "$RELEASE_INFO" | jq -r '.published_at')
          export BUILD_NOTES=$(echo "$RELEASE_INFO" | jq -r '.body // "Update available"')
          node scripts/build-latest-json.js
          cat assets/latest.json

      - name: Upload latest.json to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.get_tag.outputs.tag }}"
          REPO="${{ github.repository }}"
          EXISTING=$(gh api repos/$REPO/releases/tags/$TAG | jq -r '.assets[] | select(.name == "latest.json") | .id')
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            gh api -X DELETE repos/$REPO/releases/assets/$EXISTING
          fi
          gh release upload "$TAG" assets/latest.json --repo "$REPO" --clobber
          echo "=== Verification ==="
          gh release view "$TAG" --repo "$REPO" --json assets | jq -r '.assets[].name'
