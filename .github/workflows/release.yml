name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          brew install libpng

      - name: Install frontend dependencies
        run: npm install

      - name: Extract changelog for version
        id: changelog
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          CHANGELOG=$(awk "/^## \[${VERSION}\]/{flag=1;next}/^## \[/{flag=0}flag" CHANGELOG.md)
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="See assets to download this version."
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.5.21
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "Image Filter v__VERSION__"
          releaseBody: ${{ steps.changelog.outputs.changelog }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      - name: Upload updater artifacts to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          REPO="${{ github.repository }}"
          
          echo "=== Uploading updater artifacts ==="
          
          # Find and upload all updater-related files (.tar.gz, .zip, .sig)
          # but skip .dmg, .msi, .exe, .app which are already uploaded by tauri-action
          find src-tauri/target -path "*/bundle/*" -type f \( -name "*.tar.gz" -o -name "*.tar.gz.sig" -o -name "*.nsis.zip" -o -name "*.nsis.zip.sig" -o -name "*.msi.zip" -o -name "*.msi.zip.sig" \) 2>/dev/null | while read filepath; do
            filename=$(basename "$filepath")
            echo "Uploading updater artifact: $filename"
            gh release upload "$TAG" "$filepath" --repo "$REPO" --clobber || echo "Warning: failed to upload $filename"
          done
          
          echo "=== Done uploading updater artifacts ==="

  merge-updater-json:
    needs: publish-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get tag name
        id: get_tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Version tag: $TAG"

      - name: Wait for release and collect assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.get_tag.outputs.tag }}"
          REPO="${{ github.repository }}"
          
          echo "Waiting for release $TAG..."
          for i in $(seq 1 30); do
            if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
              echo "Release available!"
              break
            fi
            sleep 10
          done
          
          # Download all release assets
          mkdir -p assets
          gh release download "$TAG" --repo "$REPO" --dir assets --clobber || true
          
          echo "=== All release assets ==="
          ls -la assets/

      - name: Build latest.json from updater artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.get_tag.outputs.tag }}"
          REPO="${{ github.repository }}"
          VERSION="${TAG#v}"
          
          RELEASE_INFO=$(gh api repos/$REPO/releases/tags/$TAG)
          PUB_DATE=$(echo "$RELEASE_INFO" | jq -r '.published_at')
          NOTES=$(echo "$RELEASE_INFO" | jq -r '.body // "Update available"')
          BASE_URL="https://github.com/$REPO/releases/download/$TAG"
          
          cd assets
          
          node -e "
            const fs = require('fs');
            
            const version = '$VERSION';
            const pubDate = '$PUB_DATE';
            const notes = process.argv[1];
            const baseUrl = '$BASE_URL';
            
            let platforms = {};
            const files = fs.readdirSync('.');
            
            console.log('Available files:', files);
            
            // macOS: look for .app.tar.gz
            const macTar = files.find(f => f.endsWith('.app.tar.gz'));
            const macSig = files.find(f => f.endsWith('.app.tar.gz.sig'));
            if (macTar) {
              let sig = '';
              if (macSig && fs.existsSync(macSig)) {
                sig = fs.readFileSync(macSig, 'utf8').trim();
              }
              platforms['darwin-universal'] = {
                signature: sig,
                url: baseUrl + '/' + encodeURIComponent(macTar)
              };
              console.log('Added darwin-universal:', macTar);
            }
            
            // Windows NSIS: look for .nsis.zip
            const winNsis = files.find(f => f.includes('.nsis.zip') && !f.endsWith('.sig'));
            const winNsisSig = files.find(f => f.includes('.nsis.zip.sig'));
            if (winNsis) {
              let sig = '';
              if (winNsisSig && fs.existsSync(winNsisSig)) {
                sig = fs.readFileSync(winNsisSig, 'utf8').trim();
              }
              platforms['windows-x86_64'] = {
                signature: sig,
                url: baseUrl + '/' + encodeURIComponent(winNsis)
              };
              console.log('Added windows-x86_64:', winNsis);
            }
            
            // Windows MSI: look for .msi.zip (fallback)
            if (!platforms['windows-x86_64']) {
              const winMsi = files.find(f => f.includes('.msi.zip') && !f.endsWith('.sig'));
              const winMsiSig = files.find(f => f.includes('.msi.zip.sig'));
              if (winMsi) {
                let sig = '';
                if (winMsiSig && fs.existsSync(winMsiSig)) {
                  sig = fs.readFileSync(winMsiSig, 'utf8').trim();
                }
                platforms['windows-x86_64'] = {
                  signature: sig,
                  url: baseUrl + '/' + encodeURIComponent(winMsi)
                };
                console.log('Added windows-x86_64 (msi):', winMsi);
              }
            }
            
            const latest = {
              version: version,
              notes: notes,
              pub_date: pubDate,
              platforms: platforms
            };
            
            fs.writeFileSync('latest.json', JSON.stringify(latest, null, 2));
            console.log('Generated latest.json:', JSON.stringify(latest, null, 2));
          " "$NOTES"
          
          echo "=== Final latest.json ==="
          cat latest.json

      - name: Upload latest.json to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.get_tag.outputs.tag }}"
          REPO="${{ github.repository }}"
          
          # Delete existing latest.json if present
          EXISTING=$(gh api repos/$REPO/releases/tags/$TAG | jq -r '.assets[] | select(.name == "latest.json") | .id')
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "Deleting existing latest.json..."
            gh api -X DELETE repos/$REPO/releases/assets/$EXISTING
          fi
          
          echo "Uploading latest.json..."
          gh release upload "$TAG" assets/latest.json --repo "$REPO" --clobber
          
          echo "=== Verification ==="
          gh release view "$TAG" --repo "$REPO" --json assets | jq -r '.assets[].name'
