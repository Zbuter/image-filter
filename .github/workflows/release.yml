name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          brew install libpng

      - name: Install frontend dependencies
        run: npm install

      - name: Extract changelog for version
        id: changelog
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          CHANGELOG=$(awk "/^## \[${VERSION}\]/{flag=1;next}/^## \[/{flag=0}flag" CHANGELOG.md)
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="See assets to download this version."
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.5.21
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "Image Filter v__VERSION__"
          releaseBody: ${{ steps.changelog.outputs.changelog }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      - name: Upload updater artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="v${{ github.ref_name }}"
          TAG="${TAG#refs/tags/}"
          REPO="${{ github.repository }}"
          
          # Find updater JSON and sig files generated by tauri
          echo "Searching for updater artifacts..."
          
          # macOS updater artifacts
          if [ "${{ matrix.platform }}" = "macos-latest" ]; then
            find src-tauri/target -name "*.tar.gz" -path "*/bundle/*" 2>/dev/null | while read f; do
              echo "Found macOS updater artifact: $f"
            done
            find src-tauri/target -name "*.tar.gz.sig" -path "*/bundle/*" 2>/dev/null | while read f; do
              echo "Found macOS sig: $f"
            done
          fi
          
          # Windows updater artifacts  
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            find src-tauri/target -name "*.zip" -path "*/bundle/*" 2>/dev/null | while read f; do
              echo "Found Windows updater artifact: $f"
            done
            find src-tauri/target -name "*.zip.sig" -path "*/bundle/*" 2>/dev/null | while read f; do
              echo "Found Windows sig: $f"
            done
          fi
          
          # List all bundle artifacts for debugging
          echo "=== All bundle artifacts ==="
          find src-tauri/target -path "*/bundle/*" -type f 2>/dev/null | head -30 || true

  merge-updater-json:
    needs: publish-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get tag name
        id: get_tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Version tag: $TAG"

      - name: Wait for release to be ready
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.get_tag.outputs.tag }}"
          REPO="${{ github.repository }}"
          
          echo "Waiting for release $TAG to be available..."
          for i in $(seq 1 30); do
            if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
              echo "Release $TAG is available!"
              break
            fi
            echo "Attempt $i: Release not ready yet, waiting 10s..."
            sleep 10
          done

      - name: Download all release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.get_tag.outputs.tag }}"
          REPO="${{ github.repository }}"
          
          RELEASE_INFO=$(gh api repos/$REPO/releases/tags/$TAG)
          ASSETS=$(echo "$RELEASE_INFO" | jq -r '.assets[] | "\(.name)|\(.url)"')
          
          mkdir -p assets
          while IFS='|' read -r name url; do
            if [[ "$name" == *.json ]]; then
              echo "Downloading $name..."
              curl -L -H "Authorization: token $GITHUB_TOKEN" \
                -H "Accept: application/octet-stream" \
                -o "assets/$name" "$url"
            fi
          done <<< "$ASSETS"
          
          echo "=== Downloaded assets ==="
          ls -la assets/

      - name: Generate latest.json from release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.get_tag.outputs.tag }}"
          REPO="${{ github.repository }}"
          VERSION="${TAG#v}"
          
          # Get release info for building latest.json
          RELEASE_INFO=$(gh api repos/$REPO/releases/tags/$TAG)
          PUB_DATE=$(echo "$RELEASE_INFO" | jq -r '.published_at')
          NOTES=$(echo "$RELEASE_INFO" | jq -r '.body // "Update available"')
          
          # Get all asset download URLs
          ASSETS_JSON=$(echo "$RELEASE_INFO" | jq -c '.assets')
          
          cd assets
          
          # Check if tauri-action uploaded any updater JSON files
          JSON_FILES=$(ls -1 *.json 2>/dev/null | grep -v latest.json || true)
          
          if [ -n "$JSON_FILES" ]; then
            echo "Found updater JSON files from tauri-action: $JSON_FILES"
            
            # Merge platform-specific JSON files
            node -e "
              const fs = require('fs');
              const files = process.argv.slice(2);
              
              let merged = { version: '$VERSION', notes: '', pub_date: '$PUB_DATE', platforms: {} };
              
              for (const file of files) {
                try {
                  const data = JSON.parse(fs.readFileSync(file, 'utf8'));
                  console.log('Processing:', file, JSON.stringify(data, null, 2));
                  if (data.version) merged.version = data.version;
                  if (data.notes) merged.notes = data.notes;
                  if (data.pub_date) merged.pub_date = data.pub_date;
                  if (data.platforms) Object.assign(merged.platforms, data.platforms);
                  for (const key of ['darwin', 'windows', 'linux', 'darwin-aarch64', 'darwin-x86_64', 'windows-x86_64']) {
                    if (data[key]) merged.platforms[key] = data[key];
                  }
                } catch (e) {
                  console.error('Error processing', file, e.message);
                }
              }
              
              fs.writeFileSync('latest.json', JSON.stringify(merged, null, 2));
              console.log('Merged latest.json:', JSON.stringify(merged, null, 2));
            " $JSON_FILES
          else
            echo "No updater JSON from tauri-action. Building latest.json from release assets..."
            
            # Build latest.json manually from release assets
            node -e "
              const fs = require('fs');
              const assets = $ASSETS_JSON;
              const version = '$VERSION';
              const pubDate = '$PUB_DATE';
              const notes = $(echo "$NOTES" | jq -Rs .);
              
              const baseUrl = 'https://github.com/$REPO/releases/download/$TAG/';
              
              let platforms = {};
              
              // Find macOS updater artifact (.tar.gz)
              const macAsset = assets.find(a => a.name.endsWith('.app.tar.gz'));
              const macSig = assets.find(a => a.name.endsWith('.app.tar.gz.sig'));
              if (macAsset) {
                platforms['darwin-universal'] = {
                  signature: macSig ? '' : '',
                  url: baseUrl + macAsset.name
                };
              }
              
              // Find Windows NSIS updater artifact
              const winNsisAsset = assets.find(a => a.name.includes('-setup.nsis.zip'));
              const winNsisSig = assets.find(a => a.name.includes('-setup.nsis.zip.sig'));
              if (winNsisAsset) {
                platforms['windows-x86_64'] = {
                  signature: winNsisSig ? '' : '',
                  url: baseUrl + winNsisAsset.name
                };
              }
              
              const latest = {
                version: version,
                notes: notes,
                pub_date: pubDate,
                platforms: platforms
              };
              
              fs.writeFileSync('latest.json', JSON.stringify(latest, null, 2));
              console.log('Generated latest.json:', JSON.stringify(latest, null, 2));
            "
          fi
          
          echo "=== Final latest.json ==="
          cat latest.json

      - name: Read signatures and update latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.get_tag.outputs.tag }}"
          REPO="${{ github.repository }}"
          
          # Download .sig files to fill in signatures
          RELEASE_INFO=$(gh api repos/$REPO/releases/tags/$TAG)
          
          # Download all sig files
          echo "$RELEASE_INFO" | jq -r '.assets[] | select(.name | endswith(".sig")) | "\(.name)|\(.url)"' | while IFS='|' read -r name url; do
            echo "Downloading signature: $name"
            curl -sL -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/octet-stream" \
              -o "assets/$name" "$url"
          done
          
          # Update latest.json with actual signatures
          cd assets
          node -e "
            const fs = require('fs');
            const latest = JSON.parse(fs.readFileSync('latest.json', 'utf8'));
            
            // Map sig files to platform entries
            const sigFiles = fs.readdirSync('.').filter(f => f.endsWith('.sig'));
            console.log('Available sig files:', sigFiles);
            
            for (const [platform, info] of Object.entries(latest.platforms)) {
              // Find matching sig file
              const assetName = info.url.split('/').pop();
              const sigName = assetName + '.sig';
              
              if (fs.existsSync(sigName)) {
                const sig = fs.readFileSync(sigName, 'utf8').trim();
                latest.platforms[platform].signature = sig;
                console.log('Set signature for', platform, 'from', sigName);
              } else {
                console.log('No sig file found for', platform, '(expected:', sigName, ')');
              }
            }
            
            fs.writeFileSync('latest.json', JSON.stringify(latest, null, 2));
            console.log('Updated latest.json:', JSON.stringify(latest, null, 2));
          "

      - name: Upload latest.json to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.get_tag.outputs.tag }}"
          REPO="${{ github.repository }}"
          
          # Delete existing latest.json if present
          EXISTING=$(gh api repos/$REPO/releases/tags/$TAG | jq -r '.assets[] | select(.name == "latest.json") | .id')
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "Deleting existing latest.json..."
            gh api -X DELETE repos/$REPO/releases/assets/$EXISTING
          fi
          
          echo "Uploading latest.json..."
          gh release upload "$TAG" assets/latest.json --repo "$REPO" --clobber
          
          echo "=== Verification ==="
          gh release view "$TAG" --repo "$REPO" --json assets | jq -r '.assets[].name'
